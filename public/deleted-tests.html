<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 Medical App — Recover Tests</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
<nav id="sideNav"></nav>
<main>
  <div class="section-head">
    <h2>Recover Tests</h2>
    <div id="topNav" class="section-actions"></div>
  </div>

  <div class="tbl-wrap">
    <table class="fixed-cols">
      <thead>
        <tr>
          <th style="width:90px">Date</th>
          <th style="width:150px">Facility</th>
          <th style="width:180px">Test</th>
          <th style="width:80px">Result</th>
          <th style="width:70px">Unit</th>
          <th style="width:60px">Low</th>
          <th style="width:60px">High</th>
          <th style="width:170px">Deleted At</th>
          <th style="width:200px"></th>
        </tr>
      </thead>
      <tbody id="deletedBody"></tbody>
    </table>
  </div>

  <div id="emptyMsg" style="display:none;padding:24px;color:var(--text2);text-align:center;font-size:14px">No deleted test records.</div>
</main>
</div>

<div class="toast" id="toast"></div>
<div class="auth-backdrop" id="authBackdrop">
  <div class="auth-modal">
    <h3>Sign In Required</h3>
    <p>Please sign in to access your lab records.</p>
    <form class="auth-form" id="authForm">
      <input type="text" id="authUser" placeholder="Username" autocomplete="username" required>
      <input type="password" id="authPass" placeholder="Password" autocomplete="current-password" required>
      <div class="auth-error" id="authError"></div>
      <div class="auth-row"><button class="primary" type="submit">Sign In</button></div>
    </form>
  </div>
</div>

<script src="shared.js"></script>
<script src="js/deleted-tests.js"></script>
</body>
</html>
