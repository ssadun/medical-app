<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 Medical App — Patient Information</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
<nav id="sideNav"></nav>
<main>
  <div class="patient-page">
  <div class="section-head">
    <h2>Patient Information</h2>
    <div id="topNav" class="section-actions"></div>
  </div>
  <div class="patient-summary" id="patientSummary"></div>
  <div class="patient-card">
    <h3>Personal Details</h3>
    <div class="grid2">
      <div class="field"><label>First Name</label><input type="text" id="p-ad" placeholder="First Name"></div>
      <div class="field"><label>Last Name</label><input type="text" id="p-soyad" placeholder="Last Name"></div>
    </div>
    <div class="grid2" style="margin-top:10px">
      <div class="field"><label>ID / TC No</label><input type="text" id="p-tcNo" placeholder="National ID Number"></div>
      <div class="field"><label>Gender</label>
        <select id="p-cinsiyet">
          <option value="">Select...</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div class="grid2" style="margin-top:10px">
      <div class="field"><label>Birth Date</label><input type="text" id="p-dogumTarihi" placeholder="DD.MM.YYYY"></div>
      <div class="field"><label>Age</label><input type="text" id="p-yas" placeholder="Calculated Automatically" readonly style="background:var(--bg4);color:var(--text3)"></div>
    </div>
    <div class="grid2" style="margin-top:10px">
      <div></div>
      <div class="field"><label>Blood Type</label>
        <select id="p-bloodType">
          <option value="">Select...</option>
          <option value="A Positive (A+)">A Positive (A+)</option>
          <option value="A Negative (A-)">A Negative (A-)</option>
          <option value="B Positive (B+)">B Positive (B+)</option>
          <option value="B Negative (B-)">B Negative (B-)</option>
          <option value="AB Positive (AB+)">AB Positive (AB+)</option>
          <option value="AB Negative (AB-)">AB Negative (AB-)</option>
          <option value="O Positive (O+)">O Positive (O+)</option>
          <option value="O Negative (O-)">O Negative (O-)</option>
        </select>
      </div>
    </div>
  </div>
  <div class="patient-card">
    <h3>Physical Measurements</h3>
    <div class="grid3">
      <div class="field"><label>Height (cm)</label><input type="number" id="p-boy" placeholder="e.g. 175" min="50" max="250" oninput="calcBmi()"></div>
      <div class="field"><label>Weight (kg)</label><input type="number" id="p-kilo" placeholder="e.g. 70" min="10" max="500" oninput="calcBmi()"></div>
      <div class="field"><label>BMI</label>
        <input type="text" id="p-bmi" placeholder="Auto-Calculated" readonly style="background:var(--bg4);color:var(--text3)">
        <div id="p-bmiLabel"></div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="primary" onclick="savePatient()">Save Changes</button>
  </div>
  </div><!-- /.patient-page -->
</main>
</div>

<div class="toast" id="toast"></div>
<div class="auth-backdrop" id="authBackdrop">
  <div class="auth-modal">
    <h3>Sign In Required</h3>
    <p>Please sign in to access your lab records.</p>
    <form class="auth-form" id="authForm">
      <input type="text" id="authUser" placeholder="Username" autocomplete="username" required>
      <input type="password" id="authPass" placeholder="Password" autocomplete="current-password" required>
      <div class="auth-error" id="authError"></div>
      <div class="auth-row"><button class="primary" type="submit">Sign In</button></div>
    </form>
  </div>
</div>

<script src="shared.js"></script>
<script src="js/patient.js"></script>
</body>
</html>
