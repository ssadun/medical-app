<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 Medical App — Appointments</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
<nav id="sideNav"></nav>
<main>
  <div class="section-head">
    <h2>Appointments</h2>
    <div id="topNav" class="section-actions"></div>
  </div>

  <div class="ctrls">
    <input type="text" id="q" placeholder="Hospital, service, doctor..." onkeydown="if(event.key==='Enter')applyFilters()">
    <select id="hospital"><option value="">All hospitals</option></select>
    <select id="yr"><option value="">All years</option></select>
    <button class="primary" onclick="applyFilters()">Apply</button>
  </div>

  <div class="tbl-wrap">
    <table class="fixed-cols">
      <thead>
        <tr>
          <th id="th-date" style="width:120px;cursor:pointer" onclick="setSort('date')">Date <span id="sort-date"></span></th>
          <th id="th-hospital" style="width:220px;cursor:pointer" onclick="setSort('hospital')">Hospital <span id="sort-hospital"></span></th>
          <th id="th-service" style="width:180px;cursor:pointer" onclick="setSort('service')">Service <span id="sort-service"></span></th>
          <th id="th-doctor" style="width:180px;cursor:pointer" onclick="setSort('doctor')">Doctor <span id="sort-doctor"></span></th>
          <th style="width:90px"></th>
        </tr>
      </thead>
      <tbody id="appointmentsBody"></tbody>
    </table>
  </div>
  <div class="pager" id="pager"></div>
</main>
</div>

<div class="toast" id="toast"></div>
<div class="auth-backdrop" id="authBackdrop">
  <div class="auth-modal">
    <h3>Sign In Required</h3>
    <p>Please sign in to access your lab records.</p>
    <form class="auth-form" id="authForm">
      <input type="text" id="authUser" placeholder="Username" autocomplete="username" required>
      <input type="password" id="authPass" placeholder="Password" autocomplete="current-password" required>
      <div class="auth-error" id="authError"></div>
      <div class="auth-row"><button class="primary" type="submit">Sign In</button></div>
    </form>
  </div>
</div>

<script src="shared.js"></script>
<script src="js/appointments.js"></script>
</body>
</html>
